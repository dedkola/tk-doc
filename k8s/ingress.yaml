apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tk-docs-ingress
  labels:
    app: tk-docs
  annotations:
    # Uncomment based on your ingress controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "lan-ca"
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx # Change based on your ingress controller (nginx, traefik, etc.)
  rules:
    - host: dev.doc.tk.com # Dev environment hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tk-docs-service
                port:
                  number: 443
  tls:
    - hosts:
        - doc.tk.com
      secretName: tk-docs-tls
